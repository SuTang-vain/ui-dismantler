<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>刘浩存光影星途互动图鉴</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        --primary: #6487fa;
        --primary-dark: #4268e8;
        --primary-soft: #e8eeff;
        --bg: #f8f8f8;
        --card: #ffffff;
        --text: #1e1f24;
        --sub: #848691;
        --weak: #b7b9c1;
        --line: rgba(100, 135, 250, 0.16);
        --shadow: 0 10px 26px rgba(100, 135, 250, 0.16);
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        color: var(--text);
        background: var(--bg);
        font-family:
          -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei",
          Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: geometricPrecision;
      }


      body.modal-open {
        overflow: hidden;
      }

      button {
        border: 0;
        padding: 0;
        color: inherit;
        background: transparent;
        font: inherit;
        cursor: pointer;
      }

      img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        user-select: none;
        -webkit-user-drag: none;
      }

      #app-container {
        width: 100%;
        height: 100%;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        padding: 14px;
        background:
          radial-gradient(
            circle at 12% 12%,
            rgba(100, 135, 250, 0.16),
            transparent 26%
          ),
          radial-gradient(
            circle at 88% 10%,
            rgba(255, 213, 226, 0.72),
            transparent 24%
          ),
          linear-gradient(135deg, #ffffff 0%, #f8faff 52%, #f8f8f8 100%);
        touch-action: pan-x pan-y;
        container-type: size;
        container-name: app;
      }

      html.is-scaled-canvas,
      body.is-scaled-canvas {
        width: 100%;
        min-height: 100%;
        margin: 0;
        padding: 0;
        /* 卡片按 1:1.2 定高后，高屏下方留白与卡片同色，避免出现突兀的灰块 */
        background:
          radial-gradient(
            circle at 12% 8%,
            rgba(100, 135, 250, 0.14),
            transparent 30%
          ),
          radial-gradient(
            circle at 88% 6%,
            rgba(255, 213, 226, 0.6),
            transparent 26%
          ),
          linear-gradient(135deg, #ffffff 0%, #f8faff 52%, #f8f8f8 100%);
      }

      /* 运行容器包裹层：宽度撑满宿主容器，高度按选定基准比例自适应。
         这样在百度 App 百科卡片这类内容流嵌入场景里也有稳定高度，
         不再依赖 window.innerHeight 或宿主给定高度。 */
      #app-frame {
        position: relative;
        width: 100%;
        margin: 0 auto;
        overflow: hidden;
      }

      #app-container.is-scaled {
        position: absolute;
        top: 0;
        left: 0;
        transform-origin: top left;
      }

      .stage {
        flex: 1;
        min-height: 0;
        position: relative;
        overflow: hidden;
      }

      .view {
        position: absolute;
        inset: 0;
        display: none;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
      }

      .view.active {
        display: grid;
      }

      .nav {
        flex-shrink: 0;
        height: 58px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        padding-top: 12px;
        overflow: hidden;
      }

      .nav-btn {
        height: 46px;
        border-radius: 18px;
        color: var(--primary-dark);
        background: rgba(255, 255, 255, 0.82);
        box-shadow: inset 0 0 0 1px var(--line);
        font-size: 18px;
        line-height: 1;
        font-weight: 850;
        transition:
          transform 0.18s ease,
          background 0.18s ease,
          color 0.18s ease;
      }

      .nav-btn.active {
        color: #ffffff;
        background: var(--primary);
        box-shadow: 0 10px 22px rgba(100, 135, 250, 0.28);
      }

      .nav-btn:active {
        transform: scale(0.97);
      }

      .identity-view {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .photo-card,
      .info-card,
      .logic-card,
      .actor-card,
      .work-card,
      .category-btn,
      .modal-card {
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
      }

      .photo-card {
        position: relative;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        border-radius: 24px;
        background: var(--primary-soft);
      }

      .photo-card img {
        object-fit: cover;
      }

      .photo-caption {
        position: absolute;
        left: 14px;
        right: 14px;
        bottom: 14px;
        min-height: 38px;
        padding: 9px 12px;
        border-radius: 16px;
        color: #ffffff;
        background: linear-gradient(
          90deg,
          rgba(30, 31, 36, 0.84),
          rgba(30, 31, 36, 0.48)
        );
        display: grid;
        gap: 5px;
        text-align: left;
        font-size: 13px;
        line-height: 1.2;
        font-weight: 760;
      }

      .photo-caption strong {
        font-size: 17px;
        line-height: 1.08;
        font-weight: 950;
      }

      .photo-caption span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        opacity: 0.92;
      }

      .role-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      .role-tags i {
        padding: 3px 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.2);
        font-size: 11px;
        line-height: 1;
        font-style: normal;
        font-weight: 820;
      }


      .gallery-arrows {
        position: absolute;
        left: 14px;
        right: 14px;
        top: 50%;
        display: flex;
        justify-content: space-between;
        transform: translateY(-50%);
        pointer-events: none;
      }

      .arrow {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        color: #ffffff;
        background: rgba(30, 31, 36, 0.42);
        font-size: 30px;
        line-height: 1;
        font-weight: 900;
        pointer-events: auto;
      }

      .info-card {
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        border-radius: 24px;
        padding: 18px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 14px;
      }


      .identity-cloud {
        display: none;
      }

      .name-block {
        display: grid;
        gap: 8px;
      }

      .artist-name {
        font-size: 34px;
        line-height: 1.12;
        font-weight: 900;
        letter-spacing: -0.04em;
      }

      .artist-desc {
        color: var(--sub);
        font-size: 16px;
        line-height: 1.18;
        font-weight: 760;
      }

      .tag-row {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      .tag {
        min-height: 34px;
        border-radius: 16px;
        padding: 0 10px;
        color: var(--primary-dark);
        background: var(--primary-soft);
        display: grid;
        place-items: center;
        text-align: center;
        font-size: 14px;
        line-height: 1.1;
        font-weight: 880;
      }


      .facts {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(2, 1fr);
        gap: 10px;
        min-height: 0;
      }

      .fact {
        position: relative;
        min-width: 0;
        min-height: 0;
        border-radius: 16px;
        padding: 12px 14px 12px 18px;
        background: var(--bg);
        box-shadow: inset 0 0 0 1px rgba(30, 31, 36, 0.04);
        display: grid;
        align-content: center;
        gap: 5px;
      }

      .fact::before {
        content: "";
        position: absolute;
        left: 8px;
        top: 12px;
        bottom: 12px;
        width: 3px;
        border-radius: 3px;
        background: var(--primary);
      }

      .fact span {
        color: var(--primary-dark);
        font-size: 11px;
        line-height: 1;
        font-weight: 820;
        letter-spacing: 0.06em;
      }

      .fact strong {
        color: var(--text);
        font-size: 15px;
        line-height: 1.2;
        font-weight: 920;
      }

      .fact small {
        color: var(--sub);
        font-size: 12px;
        line-height: 1.3;
        font-weight: 640;
        padding-top: 1px;
      }


      .mini-note {
        min-height: 40px;
        border-radius: 15px;
        padding: 10px 12px;
        color: var(--primary-dark);
        background: rgba(100, 135, 250, 0.1);
        font-size: 15px;
        line-height: 1.2;
        font-weight: 850;
      }

      .costar-view {
        grid-template-rows: minmax(0, 1fr);
        gap: 0;
      }

      .radar-stage {
        position: relative;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        border-radius: 22px;
        background:
          radial-gradient(
            circle at 50% 50%,
            rgba(100, 135, 250, 0.18),
            transparent 26%
          ),
          linear-gradient(
            135deg,
            rgba(255, 255, 255, 0.82),
            rgba(232, 238, 255, 0.72)
          );
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        touch-action: pan-x pan-y;
      }

      .graph-legend {
        position: absolute;
        left: 12px;
        top: 12px;
        z-index: 8;
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 7px 10px;
        border-radius: 999px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.84);
        box-shadow: inset 0 0 0 1px var(--line);
        font-size: 12px;
        line-height: 1;
        font-weight: 820;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 5px;
        white-space: nowrap;
      }

      .legend-line {
        width: 22px;
        height: 4px;
        border-radius: 999px;
        display: block;
      }

      .legend-line.multi {
        background: var(--primary);
      }

      .legend-line.film {
        background: #d94b4b;
      }

      .legend-line.series {
        background: #4aa06e;
      }

      .graph-canvas {
        position: absolute;
        inset: 0;
        transition: right 0.36s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .graph-wrap.panel-open .graph-canvas {
        right: 340px;
      }

      .edges {
        position: absolute;
        inset: 0;
        z-index: 1;
        width: 100%;
        height: 100%;
        overflow: visible;
        pointer-events: none;
      }

      .edge {
        stroke-width: 1.8;
        stroke-linecap: round;
        opacity: 0.44;
        transition:
          opacity 0.2s ease,
          stroke-width 0.2s ease;
      }

      .edge.multi {
        stroke: var(--primary);
      }

      .edge.film {
        stroke: #d94b4b;
      }

      .edge.series {
        stroke: #4aa06e;
      }

      .edge.hl {
        stroke-width: 3;
        opacity: 1;
      }

      .edge.dim {
        opacity: 0.14;
      }


      .radar-stage::before,
      .radar-stage::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        border: 1px solid rgba(100, 135, 250, 0.16);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .radar-stage::before {
        width: min(64%, 360px);
        aspect-ratio: 1;
      }

      .radar-stage::after {
        width: min(88%, 500px);
        aspect-ratio: 1;
      }

      .radar-center {
        position: absolute;
        left: 50%;
        top: 50%;
        z-index: 3;
        width: 108px;
        height: 108px;
        border-radius: 32px;
        overflow: hidden;
        background: #ffffff;
        border: 3px solid rgba(255, 255, 255, 0.92);
        box-shadow: 0 18px 32px rgba(100, 135, 250, 0.3);
        outline: none;
        -webkit-tap-highlight-color: transparent;
        transform: translate(-50%, -50%);
      }


      .radar-center::after {
        content: "刘浩存";
        position: absolute;
        left: 8px;
        right: 8px;
        bottom: 8px;
        padding: 5px 7px;
        border-radius: 999px;
        color: #ffffff;
        background: rgba(30, 31, 36, 0.62);
        font-size: 13px;
        line-height: 1;
        font-weight: 900;
        text-align: center;
      }

      .radar-center img {
        object-fit: cover;
      }

      .radar-center-ring {
        position: absolute;
        left: 50%;
        top: 50%;
        z-index: 2;
        width: 148px;
        height: 148px;
        border-radius: 50%;
        border: 1px solid rgba(100, 135, 250, 0.36);
        transform: translate(-50%, -50%);
        animation: centerBreath 2.8s ease-in-out infinite;
        pointer-events: none;
      }

      @keyframes centerBreath {
        0%,
        100% {
          opacity: 0.28;
          transform: translate(-50%, -50%) scale(0.94);
        }
        50% {
          opacity: 0.78;
          transform: translate(-50%, -50%) scale(1.06);
        }
      }

      .radar-node {
        position: absolute;
        z-index: 4;
        width: 86px;
        min-width: 0;
        display: grid;
        justify-items: center;
        gap: 7px;
        color: var(--text);
        transform: translate(-50%, -50%) scale(0.94);
        opacity: 0.88;
        transition:
          transform 0.2s ease,
          opacity 0.2s ease;
      }

      .radar-node:active {
        transform: translate(-50%, -50%) scale(0.88);
      }

      .radar-node.active {
        color: var(--primary-dark);
        transform: translate(-50%, -50%) scale(1.08);
        opacity: 1;
      }

      .radar-node.pos-0 {
        left: 50%;
        top: 15%;
      }
      .radar-node.pos-1 {
        left: 18%;
        top: 29%;
      }
      .radar-node.pos-2 {
        left: 82%;
        top: 29%;
      }
      .radar-node.pos-3 {
        left: 20%;
        top: 72%;
      }
      .radar-node.pos-4 {
        left: 80%;
        top: 72%;
      }
      .radar-node.pos-5 {
        left: 50%;
        top: 88%;
      }

      .node-avatar {
        position: relative;
        width: 58px;
        height: 58px;
        border-radius: 20px;
        overflow: visible;
        display: block;
      }

      .node-avatar::before {
        content: "";
        position: absolute;
        inset: -8px;
        z-index: 0;
        border-radius: 26px;
        border: 1px solid rgba(100, 135, 250, 0.36);
        background: rgba(100, 135, 250, 0.08);
        animation: nodeBreath 2.6s ease-in-out infinite;
      }

      .node-avatar img {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        border-radius: inherit;
        object-fit: cover;
        border: 2px solid rgba(255, 255, 255, 0.94);
        box-shadow: 0 12px 22px rgba(100, 135, 250, 0.22);
      }

      .radar-node.active .node-avatar::before {
        border-color: rgba(100, 135, 250, 0.58);
        background: rgba(100, 135, 250, 0.14);
        animation-duration: 1.85s;
      }

      .radar-node.active .node-avatar img {
        box-shadow: 0 16px 30px rgba(100, 135, 250, 0.38);
      }

      @keyframes nodeBreath {
        0%,
        100% {
          opacity: 0.35;
          transform: scale(0.9);
        }
        50% {
          opacity: 0.9;
          transform: scale(1.08);
        }
      }

      .node-name {
        max-width: 100%;
        padding: 5px 7px;
        border-radius: 999px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: inherit;
        background: rgba(255, 255, 255, 0.78);
        font-size: 12px;
        line-height: 1;
        font-weight: 850;
        box-shadow: inset 0 0 0 1px var(--line);
      }

      .node {
        position: absolute;
        z-index: 4;
        width: 86px;
        min-width: 0;
        display: grid;
        justify-items: center;
        gap: 7px;
        color: var(--text);
        transform: translate(-50%, -50%) scale(0.94);
        opacity: 0.9;
        cursor: pointer;
        outline: none;
        -webkit-tap-highlight-color: transparent;
        transition:
          transform 0.2s ease,
          opacity 0.2s ease;
        touch-action: none;
      }

      .node:focus,
      .node:focus-visible,
      .radar-center:focus,
      .radar-center:focus-visible {
        outline: none;
      }


      .node.dragging-now {
        transition: none;
      }

      .node.grabbing {
        z-index: 20;
        cursor: grabbing;
      }

      .node.active {
        color: var(--primary-dark);
        transform: translate(-50%, -50%) scale(1.08);
        opacity: 1;
      }

      .node.dim {
        opacity: 0.35;
      }

      .node .float-inner {
        display: grid;
        justify-items: center;
        gap: 7px;
        animation: floatMotion 5.8s ease-in-out infinite alternate;
      }

      @keyframes floatMotion {
        from {
          transform: translateY(-4px);
        }
        to {
          transform: translateY(4px);
        }
      }

      .node .avatar {
        position: relative;
        width: 62px;
        height: 62px;
        border-radius: 50%;
        overflow: hidden;
        background: #ffffff;
        border: 2px solid rgba(255, 255, 255, 0.96);
        box-shadow: 0 12px 22px rgba(100, 135, 250, 0.22);
      }

      .node .avatar img {
        object-fit: cover;
      }

      .node .name {
        max-width: 100%;
        padding: 5px 8px;
        border-radius: 999px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: inherit;
        background: rgba(255, 255, 255, 0.82);
        font-size: 12px;
        line-height: 1;
        font-weight: 850;
        box-shadow: inset 0 0 0 1px var(--line);
      }


      .works-view {
        grid-template-rows: 40px minmax(0, 1fr);
        gap: 12px;
      }

      .category-row {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        overflow: hidden;
      }

      .category-btn {
        border-radius: 18px;
        color: var(--primary-dark);
        font-size: 17px;
        line-height: 1;
        font-weight: 880;
      }

      .category-btn.active {
        color: #ffffff;
        background: var(--primary);
      }

      .works-shell {
        position: relative;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
      }

      .work-grid {
        min-width: 0;
        min-height: 0;
        height: 100%;
        overflow-x: auto;
        overflow-y: hidden;
        display: flex;
        align-items: stretch;
        gap: 12px;
        overscroll-behavior-x: contain;
        scroll-snap-type: x mandatory;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      .work-grid::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }

      .works-more-button {
        position: absolute;
        right: 10px;
        top: 50%;
        z-index: 3;
        width: 46px;
        height: 46px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: #ffffff;
        background: var(--primary);
        border: 2px solid rgba(255, 255, 255, 0.92);
        box-shadow: 0 12px 28px rgba(42, 91, 255, 0.34), 0 4px 10px rgba(30, 31, 36, 0.18);
        font-size: 30px;
        line-height: 1;
        font-weight: 900;
        transform: translateY(-50%);
      }

      .works-more-button[hidden] {
        display: none;
      }

      .work-card {
        flex: 0 0 calc((100% - 36px) / 4);
        min-width: 0;
        min-height: 0;
        border-radius: 20px;
        padding: 10px;
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1.35fr) auto;
        gap: 8px;
        overflow: hidden;
        text-align: center;
        scroll-snap-align: start;
        cursor: default;
      }


      .poster {
        min-width: 0;
        min-height: 0;
        border-radius: 16px;
        overflow: hidden;
        background: var(--primary-soft);
      }

      .poster img {
        object-fit: cover;
      }

      .work-info {
        min-width: 0;
        min-height: 0;
        display: grid;
        align-content: start;
        justify-items: center;
        gap: 5px;
      }

      .work-title {
        font-size: 16px;
        line-height: 1.15;
        font-weight: 900;
      }

      .work-meta,
      .work-role,
      .work-partners,
      .work-stat {
        font-size: 12px;
        line-height: 1.15;
        font-weight: 760;
      }

      .work-meta {
        color: var(--primary-dark);
      }

      .work-role,
      .work-partners {
        color: var(--sub);
      }

      .work-stat {
        max-width: 100%;
        padding: 4px 7px;
        border-radius: 999px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #245c42;
        background: #e8f7ef;
      }


      .status {
        width: max-content;
        justify-self: center;
        padding: 4px 8px;
        border-radius: 999px;
        color: #b64b00;
        background: #fff0dd;
        font-size: 11px;
        line-height: 1;
        font-weight: 820;
      }

      .modal {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        z-index: 20;
        width: min(340px, 100%);
        display: none;
        align-items: stretch;
        justify-content: flex-end;
        padding: 12px 12px 12px 0;
        overflow: hidden;
        background: transparent;

        // 基准选择只看运行容器尺寸/比例，不用 UA/screen/触控（Skill §4.2/§5.2）
        function shouldUseSmallBase(w, h) {
          var ratio = w / h;
          var isPortraitLike = ratio < 1; // 竖向容器
          var isCompactCard = w < 415 || h < 456; // 手机视口/紧凑卡片
          var isNarrowMobileCard = w <= 768 && isPortraitLike; // 窄且竖 → 移动端
          return isCompactCard || isNarrowMobileCard;

        function applyScale() {
          var frame = document.getElementById("app-frame");
          var app = document.getElementById("app-container");
          if (!frame || !app) return;
          // 宽度取运行容器实际宽度（嵌入百度 App 卡片时即卡片宽度）
          var w = Math.round(frame.getBoundingClientRect().width) || window.innerWidth;
          var winH = window.innerHeight;
          var base = shouldUseSmallBase(w, winH) ? BASE_SMALL : BASE_LARGE;
          // 移动端严格保持基准宽高比（小画布 380:456 = 1:1.2）：
          // 容器高度 = 宽度 × 基准比例，并以视口高度封顶，避免超出一屏
          var ratioHeight = Math.round((w * base.h) / base.w);
          var h = Math.min(ratioHeight, winH);
          var scale = Math.min(w / base.w, h / base.h);
          var offsetX = (w - base.w * scale) / 2;
          var offsetY = (h - base.h * scale) / 2;
          scaleFactor = scale;

            app.style.top = Math.round(offsetY) + "px";

            var ax = a.x;
            var ay = a.y;
            var bx = b.x;
            var by = b.y;
            var dx = bx - ax;
            var dy = by - ay;
            var dist = Math.hypot(dx, dy) || 1;
            var ux = dx / dist;
            var uy = dy / dist;
            var elA = a.el.classList.contains("radar-center") ? a.el : a.el.querySelector(".avatar") || a.el;
            var elB = b.el.classList.contains("radar-center") ? b.el : b.el.querySelector(".avatar") || b.el;
            var rA = Math.max((elA.offsetWidth || 0) / 2, line.dataset.a === "hero" ? 54 : 32) + 3;
            var rB = Math.max((elB.offsetWidth || 0) / 2, line.dataset.b === "hero" ? 54 : 32) + 3;
            line.setAttribute("x1", ax + ux * rA);
            line.setAttribute("y1", ay + uy * rA);
            line.setAttribute("x2", bx - ux * rB);
            line.setAttribute("y2", by - uy * rB);
          });
        }

          var moved = false;
          function state() {
            return graphNodeState[key];
          }
          function onMove(event) {
            var current = state();
            if (!current) return;
            var dx = event.clientX - startX;
            var dy = event.clientY - startY;
            if (Math.abs(dx) + Math.abs(dy) > 4) moved = true;
            var nx = Math.max(36, Math.min(graphBounds.w - 36, origX + dx));
            var ny = Math.max(36, Math.min(graphBounds.h - 36, origY + dy));
            current.x = nx;
            current.y = ny;
            current.el.style.left = nx + "px";
            current.el.style.top = ny + "px";
            updateEdgesFromDOM();
          }
          function onUp() {
            el.classList.remove("grabbing", "dragging-now");
            document.removeEventListener("pointermove", onMove);
            document.removeEventListener("pointerup", onUp);
            if (moved) el.dataset.dragged = "1";
          }
          el.addEventListener("pointerdown", function (event) {
            if (event.button !== undefined && event.button !== 0) return;
            event.preventDefault();
            startX = event.clientX;
            startY = event.clientY;
            var current = state();
            if (!current) return;
            origX = current.x;
            origY = current.y;
            moved = false;
            el.classList.add("grabbing", "dragging-now");
            document.addEventListener("pointermove", onMove);
            document.addEventListener("pointerup", onUp, { once: true });
          });
        }

        function relayout() {
          var layout = computeGraphLayout();
          Object.entries(layout).forEach(function ([key, pos]) {
            var state = graphNodeState[key];
            if (!state) return;
            state.x = pos[0];
            state.y = pos[1];
            state.el.style.left = pos[0] + "px";
            state.el.style.top = pos[1] + "px";
          });
          updateEdgesFromDOM();
        }

        function renderCostars() {
          if (!graphWrap || !graphCanvas || !graphEdges) return;
          graphCanvas.querySelectorAll(".radar-center, .radar-center-ring, .node").forEach(function (node) {
            node.remove();
          });
          graphEdges.innerHTML = "";
          graphNodeState = {};
          var layout = computeGraphLayout();
          var heroHtml =
            '<div class="radar-center-ring"></div>' +
            '<button class="radar-center" type="button" aria-label="查看刘浩存艺人身份"><img src="./image/头像.jpg" alt="刘浩存头像"></button>';
          graphCanvas.insertAdjacentHTML("afterbegin", heroHtml);
          var hero = graphCanvas.querySelector(".radar-center");
          if (hero) {
            var heroPos = layout.hero;
            hero.style.left = heroPos[0] + "px";
            hero.style.top = heroPos[1] + "px";
            hero.addEventListener("click", function () {
              switchView("identity");
            });
            graphNodeState.hero = { x: heroPos[0], y: heroPos[1], el: hero };
          }

          costars.forEach(function (item, index) {
            var pos = layout[String(index)];
            if (!pos) return;
            var btn = document.createElement("button");
            btn.className = "node";
            btn.type = "button";
            btn.dataset.actor = String(index);
            btn.setAttribute("aria-label", "查看" + item.name + "的合作详情");
            btn.innerHTML =
              '<div class="float-inner"><div class="avatar"><img src="' +
              escapeHtml(item.image) +
              '" alt="' +
              escapeHtml(item.name) +
              '头像"></div><div class="name">' +
              escapeHtml(item.name) +
              "</div></div>";
            btn.style.left = pos[0] + "px";
            btn.style.top = pos[1] + "px";
            graphCanvas.appendChild(btn);
            graphNodeState[String(index)] = { x: pos[0], y: pos[1], el: btn };
            attachDrag(btn, String(index));
            btn.addEventListener("click", function () {
              if (!btn.dataset.dragged) {
                lastModalTrigger = btn;
                openActor(index);
              }
              delete btn.dataset.dragged;
            });
            var line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("class", "edge " + actorRelationType(item));
            line.dataset.a = "hero";
            line.dataset.b = String(index);
            graphEdges.appendChild(line);
          });
          updateEdgesFromDOM();
          if (activeCostarIndex >= 0 && modal.classList.contains("active")) {
            highlightRelated(activeCostarIndex);
          } else {
            clearHighlight();
          }
          window.setTimeout(updateEdgesFromDOM, 0);
        }

        function changeCostar(step) {
          var current = activeCostarIndex < 0 ? 0 : activeCostarIndex;
          activeCostarIndex = (current + step + costars.length) % costars.length;
          openActor(activeCostarIndex);
        }

        function bindCostarRadar() {
          if (!graphWrap) return;
          graphWrap.addEventListener("pointerdown", function (event) {
            startX = event.clientX;
          });
          graphWrap.addEventListener("pointerup", function (event) {
            if (event.target.closest(".node")) return;
            var diff = event.clientX - startX;
            if (Math.abs(diff) > 35) changeCostar(diff > 0 ? -1 : 1);
          });
        }


        function renderWorks() {
          var categories = ["电影", "剧集"];
          var list = visibleWorks();
          var active = activeWork();
          var visitedCount = Object.keys(visitedWorkIds).filter(function (id) {
            return visitedWorkIds[id];
          }).length;
          var next = nextWorkInCategory(active.id);
          var progress = Math.round((visitedCount / works.length) * 100);
          var progressCopy = !worksInteracted
            ? "选一部，看她的角色变化"
            : visitedCount === works.length
              ? "作品图鉴已全部探索"
              : "下一站 · " + next.title;
          viewWorks.innerHTML =
            '<div class="works-toolbar">' +
              '<div class="category-row" aria-label="作品类型">' +
              categories
                .map(function (cat) {
                  var count = works.filter(function (work) {
                    return work.category === cat;
                  }).length;
                  return (
                    '<button class="category-btn' +
                    (cat === workCategory ? " active" : "") +
                    '" type="button" data-cat="' +
                    escapeHtml(cat) +
                    '" aria-pressed="' +
                    (cat === workCategory ? "true" : "false") +
                    '">' +
                    escapeHtml(cat) +
                    " " +
                    count +
                    "</button>"
                  );
                })
                .join("") +
              "</div>" +
              '<div class="works-progress" role="progressbar" aria-label="作品探索进度" aria-valuemin="0" aria-valuemax="' +
              works.length +
              '" aria-valuenow="' +
              visitedCount +
              '">' +
                '<span class="works-progress-copy">' + escapeHtml(progressCopy) + "</span>" +
                '<b class="works-progress-count">已探索 ' + visitedCount + "/" + works.length + "</b>" +
                '<span class="works-progress-track"><i style="width:' + progress + '%"></i></span>' +
              "</div>" +
            "</div>" +
            workFeature(active, next) +
            '<div class="work-strip-shell">' +
              '<div class="work-strip" aria-label="' +
              escapeHtml(workCategory) +
              '片单">' +
              list
                .map(function (work, index) {
                  return workThumb(work, index, active.id);
                })
                .join("") +
              "</div>" +
            "</div>";
          window.setTimeout(function () {
            var selected = viewWorks.querySelector('.work-thumb[aria-pressed="true"]');
            if (selected) selected.scrollIntoView({ block: "nearest", inline: "nearest" });
          }, 0);
        }

        function activeWork() {
          var list = visibleWorks();
          var id = activeWorkIds[workCategory];
          var found = list.filter(function (work) {
            return work.id === id;
          })[0];
          if (!found) {
            found = list[0];
            activeWorkIds[workCategory] = found.id;
          }
          return found;
        }

        function nextWorkInCategory(currentId) {
          var list = visibleWorks();
          var currentIndex = list.findIndex(function (work) {
            return work.id === currentId;
          });
          if (currentIndex < 0) return list[0];
          return list[(currentIndex + 1) % list.length];
        }

        function markWorkVisited(id) {
          visitedWorkIds[id] = true;
          worksInteracted = true;
        }

        function selectWork(id, markVisited, restoreFocus) {
          var work = workById(id);
          workCategory = work.category;
          activeWorkIds[work.category] = work.id;
          if (markVisited) markWorkVisited(work.id);
          renderWorks();
          if (restoreFocus) {
            window.setTimeout(function () {
              var button = viewWorks.querySelector('[data-select-work="' + work.id + '"]');
              if (button) button.focus();
            }, 0);
          }
        }

        function goToNextWork(restoreFocus) {
          var current = activeWork();
          markWorkVisited(current.id);
          var next = nextWorkInCategory(current.id);
          selectWork(next.id, false, false);
          if (restoreFocus) {
            window.setTimeout(function () {
              var button = viewWorks.querySelector("[data-next-work]");
              if (button) button.focus();
            }, 0);
          }
        }

        function selectPoster(workId, index, restoreFocus) {
          var work = workById(workId);
          if (!work || !work.posters || !work.posters[index]) return;
          activePosterIndexes[work.id] = index;
          markWorkVisited(work.id);
          renderWorks();
          if (restoreFocus) {
            window.setTimeout(function () {
              var button = viewWorks.querySelector(
                '[data-select-poster="' + index + '"]',
              );
              if (button) button.focus();
            }, 0);
          }
        }

        function workFeature(work, next) {
          var posters = work.posters && work.posters.length ? work.posters : [work.poster];
          var activePosterIndex = activePosterIndexes[work.id] || 0;
          if (!posters[activePosterIndex]) activePosterIndex = 0;
          var leftPosterIndex = (activePosterIndex + posters.length - 1) % posters.length;
          var posterCards = posters
            .map(function (poster, index) {
              var positionClass = index === activePosterIndex
                ? "is-active"
                : index === leftPosterIndex
                  ? "is-left"
                  : "is-right";
              return (
                '<button class="feature-poster-card ' +
                positionClass +
                '" type="button" data-select-poster="' +
                index +
                '" aria-pressed="' +
                (index === activePosterIndex ? "true" : "false") +
                '" aria-label="切换至' +
                escapeHtml(work.title) +
                '第' +
                (index + 1) +
                '幅影像">' +
                '<img src="' +
                escapeHtml(poster) +
                '" alt="' +
                escapeHtml(work.title) +
                '影像 ' +
                (index + 1) +
                '">' +
                "</button>"
              );
            })
            .join("");
          return (
            '<article class="work-feature" data-active-work="' +
            escapeHtml(work.id) +
            '">' +
            '<div class="feature-poster">' +
              '<span class="feature-watermark" aria-hidden="true">' +
              escapeHtml(work.title) +
              "</span>" +
              '<div class="feature-poster-gallery">' +
              posterCards +
              "</div>" +
              '<span class="feature-status">' +
              escapeHtml(work.status) +
              "</span>" +
            "</div>" +
            '<div class="feature-info" aria-live="polite">' +
            '<div class="feature-heading">' +
              '<span class="feature-kicker">' +
              escapeHtml(work.release) +
              " · " +
              escapeHtml(work.category) +
              "</span>" +
              '<h2 class="feature-title">' +
              escapeHtml(work.title) +
              "</h2>" +
            "</div>" +
            '<p class="feature-desc">' + escapeHtml(work.desc) + "</p>" +
            '<div class="feature-facts" aria-label="角色档案">' +
              '<span class="feature-fact"><small>饰演角色</small><b>' + escapeHtml(work.role) + "</b></span>" +
              '<span class="feature-fact"><small>合作演员</small><b>' + escapeHtml(work.partners) + "</b></span>" +
              '<span class="feature-fact"><small>作品看点</small><b>' + escapeHtml(work.stat) + "</b></span>" +
            "</div>" +
            '<div class="feature-actions">' +
              '<button class="feature-next-button" type="button" data-next-work aria-label="下一部：' +
              escapeHtml(next.title) +
              '" title="下一部：' +
              escapeHtml(next.title) +
              '">›</button>' +
            "</div>" +
            "</div>" +
            "</article>"
          );
        }

        function compactRole(role) {
          return String(role || "").split(/[\/／]/)[0].trim();
        }

        function workThumb(work, index, activeId) {
          var visited = Boolean(visitedWorkIds[work.id]);
          var isActive = work.id === activeId;
          var hint = !worksInteracted && !isActive && index === 1;
          return (
            '<button class="work-thumb' +
            (isActive ? " active" : "") +
            (visited ? " visited" : "") +
            (hint ? " is-hint" : "") +
            '" type="button" data-select-work="' +
            escapeHtml(work.id) +
            '" aria-pressed="' +
            (isActive ? "true" : "false") +
            '" aria-label="查看' +
            escapeHtml(work.title) +
            (visited ? "，已探索" : "，未探索") +
            '">' +
              '<span class="work-thumb-poster"><img src="' +
              escapeHtml(work.poster) +
              '" alt=""></span>' +
              '<span class="work-thumb-copy">' +
                '<span class="work-thumb-title">' + escapeHtml(work.title) + "</span>" +
                '<span class="work-thumb-year">' + escapeHtml(work.release) + "</span>" +
                '<span class="work-thumb-state">' +
                (isActive
                  ? "正在看"
                  : visited
                    ? "饰 " + escapeHtml(compactRole(work.role))
                    : "看她演谁") +
                "</span>" +
              "</span>" +
            "</button>"
          );
        }

        function openActor(index) {
          var actor = costars[index];
          if (!actor) return;
          activeCostarIndex = index;
          openModal(
            actor.image,
            actor.name,
            actor.weight + " · " + actor.reason,
            actorRelationLabel(actor),
            actorWorkList(actor),
          );
          if (graphWrap) graphWrap.classList.add("panel-open");
          highlightRelated(index);
          window.setTimeout(relayout, 60);
        }

        function openModal(poster, title, meta, desc, extraHtml) {
          if (!lastModalTrigger) lastModalTrigger = document.activeElement;
          modal.innerHTML =
            '<div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle" tabindex="-1">' +
            '<button class="modal-close" type="button" aria-label="关闭">×</button>' +
            '<div class="modal-poster"><img src="' +
            escapeHtml(poster) +
            '" alt="' +
            escapeHtml(title) +
            '图片"></div>' +
            '<div class="modal-info">' +
            '<strong id="modalTitle">' +
            escapeHtml(title) +
            "</strong>" +
            "<span>" +
            escapeHtml(meta) +
            "</span>" +
            "<p>" +
            escapeHtml(desc) +
            "</p>" +
            (extraHtml
              ? '<div class="modal-works">' + extraHtml + "</div>"
              : "") +
            "</div>" +
            "</div>";
          modal.classList.add("active");
          modal.setAttribute("aria-hidden", "false");
          modal
            .querySelector(".modal-close")
            .addEventListener("click", closeModal);
          modal.querySelector(".modal-close").focus();
        }

        function closeModal() {
          modal.classList.remove("active");
          modal.setAttribute("aria-hidden", "true");
          modal.innerHTML = "";
          if (graphWrap) graphWrap.classList.remove("panel-open");
          clearHighlight();
          activeCostarIndex = -1;
          window.setTimeout(relayout, 60);
          if (lastModalTrigger && document.contains(lastModalTrigger)) {
            lastModalTrigger.focus();
          }
          lastModalTrigger = null;
        }


        function switchView(name) {
          document.querySelectorAll(".view").forEach(function (view) {
            view.classList.remove("active");
          });
          document.getElementById("view-" + name).classList.add("active");
          document.querySelectorAll(".nav-btn").forEach(function (btn) {
            var active = btn.getAttribute("data-view") === name;
            btn.classList.toggle("active", active);
            btn.setAttribute("aria-current", active ? "page" : "false");
          });
          if (name !== "costars" && modal.classList.contains("active")) closeModal();
          if (name === "costars") window.setTimeout(renderCostars, 0);
          window.scrollTo({ top: 0, behavior: reduceMotion ? "auto" : "smooth" });
        }

        function bindEvents() {
          document
            .querySelector(".nav")
            .addEventListener("click", function (event) {
              var btn = event.target.closest(".nav-btn");
              if (btn) switchView(btn.getAttribute("data-view"));
            });

          viewWorks.addEventListener("click", function (event) {
            var cat = event.target.closest(".category-btn");
            if (cat) {
              workCategory = cat.getAttribute("data-cat");
              renderWorks();
              if (event.detail === 0) {
                window.setTimeout(function () {
                  var activeCategory = viewWorks.querySelector(
                    '[data-cat="' + workCategory + '"]',
                  );
                  if (activeCategory) activeCategory.focus();
                }, 0);
              }
              return;
            }
            var posterButton = event.target.closest("[data-select-poster]");
            if (posterButton) {
              var activeArticle = posterButton.closest("[data-active-work]");
              if (activeArticle) {
                selectPoster(
                  activeArticle.getAttribute("data-active-work"),
                  Number(posterButton.getAttribute("data-select-poster")) || 0,
                  event.detail === 0,
                );
              }
              return;
            }
            var workButton = event.target.closest("[data-select-work]");
            if (workButton) {
              selectWork(
                workButton.getAttribute("data-select-work"),
                true,
                event.detail === 0,
              );
              return;
            }
            var nextButton = event.target.closest("[data-next-work]");
            if (nextButton) {
              goToNextWork(event.detail === 0);
              return;
            }
          });

          modal.addEventListener("click", function (event) {
            if (event.target === modal) closeModal();
          });
          window.addEventListener("keydown", function (event) {
            if (event.key === "Escape" && modal.classList.contains("active")) {
              closeModal();
              return;
            }
            trapModalFocus(event);
          });
        }

        function startAuto() {
          stopAuto();
        }

        function handleViewportChange() {
          applyScale();
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(function () {
            if (document.getElementById("view-costars").classList.contains("active")) {
              renderCostars();
            }
          }, 150);
        }

        function init() {
          applyScale();
          renderIdentity();
          renderCostars();
          renderWorks();
          bindGallery();
          bindEvents();
          startAuto();
          window.addEventListener("resize", handleViewportChange);
          window.addEventListener("orientationchange", handleViewportChange);
          if (window.visualViewport) {
            window.visualViewport.addEventListener("resize", handleViewportChange);
          }
        }


        init();

        // applyScale 三处触发，避免刷新卡在错误基准（Skill §4.3/§5.9）
        document.addEventListener("DOMContentLoaded", applyScale);
        window.addEventListener("load", applyScale);
      })();
    </script>
  </body>
</html>
