    zixia:       { name: '紫霞仙子', actor: '朱茵 饰', img: 'images/角色_紫霞仙子.webp', desc: '如来佛祖座前日月神灯的灯芯，盘丝大仙。她为爱执着，相信谁能拔出她的紫青宝剑，谁就是她的意中人。最终为救孙悟空而死。' },

    tangsanzang: { name: '唐三藏', actor: '罗家英 饰', img: 'images/角色_唐三藏.webp', desc: '孙悟空的师父，以说话啰嗦闻名。为人慈悲，愿以命换悟空重生。是西天取经的核心人物。' },
    niumowang:   { name: '牛魔王', actor: '陆树铭 饰', img: 'images/角色_牛魔王.webp', desc: '孙悟空的结拜大哥，法力高强。一心想吃唐僧肉，并喜欢紫霞仙子，是孙悟空在取经路上的主要对手之一。' },
    chunsanniang:{ name: '春三十娘', actor: '蓝洁瑛 饰', img: 'images/角色_春三十娘.webp', desc: '蜘蛛精，盘丝大仙的大徒弟。为吃唐僧肉来到五岳山，与师妹白晶晶作对，后与二当家生下唐三藏的转世。' },
    erdangjia:   { name: '二当家', actor: '吴孟达 饰', img: 'images/角色_二当家png.webp', desc: '斧头帮的二把手，猪八戒的转世。被春三十娘奴化后，阴差阳错与其生下唐三藏的转世。' },
    puti:        { name: '菩提老祖', actor: '刘镇伟 饰', img: 'images/角色_菩提老祖.webp', desc: '至尊宝的引路人，向其揭示孙悟空转世的真相。在关键时刻出现，推动剧情发展。' },
    guanyin:     { name: '观音大士', actor: '侯艳 饰', img: 'images/角色_观音大士.webp', desc: '慈悲为怀的神仙，因孙悟空与牛魔王合谋杀害唐三藏而出手惩罚，令其五百年后投胎为人赎罪。' },
    qingxia:     { name: '青霞仙子', actor: '朱茵 饰', img: 'images/角色_青霞仙子.webp', desc: '如来佛祖座前日月神灯的另一灯芯，与紫霞一体两魂。白天是紫霞，晚上是青霞，二人仇恨颇深。' },
    sunwukong:   { name: '孙悟空', actor: '周星驰 饰', img: 'images/角色_孙悟空.webp', desc: '至尊宝的前世，法力高强的齐天大圣。为救紫霞与师父而戴上金箍，恢复真身。' },

    { key: 'plot1', name: '月光宝盒', desc: '五百年后，至尊宝与春三十娘、白晶晶相遇。为吃唐僧肉而来的两妖，与至尊宝展开纠缠。至尊宝对白晶晶一见钟情，开启了一段孽缘。', chars: ['zizunbao', 'baijingjing', 'chunsanniang'] },
    { key: 'plot2', name: '偶遇紫霞', desc: '为救自刎的白晶晶，至尊宝使用月光宝盒，却意外回到五百年前。在水帘洞，他遇到了紫霞仙子，并被她在脚底留下了三颗痣的记号。', chars: ['zizunbao', 'zixia'] },
    { key: 'plot3', name: '紫青宝剑', desc: '至尊宝无意中拔出紫霞的紫青宝剑，成为她的意中人。紫霞向他表白，但至尊宝心中仍挂念白晶晶，拒绝了她。两人的爱情宿命由此展开。', chars: ['zizunbao', 'zixia'] },
    { key: 'plot4', name: '牛魔王抢亲', desc: '牛魔王出现，欲强娶紫霞。至尊宝在与牛魔王的对抗中逐渐意识到自己对紫霞的感情，但为时已晚，紫霞被牛魔王所困。', chars: ['zizunbao', 'zixia', 'niumowang'] },
    { key: 'plot5', name: '戴上金箍', desc: '为救紫霞和师父，至尊宝决定戴上金箍，放弃凡人的情感，变回法力无边的孙悟空。这是他成长与救赎的关键一步。', chars: ['zizunbao', 'sunwukong', 'guanyin'] },
    { key: 'plot6', name: '紫霞之死', desc: '孙悟空大战牛魔王，紫霞为救悟空而死。她的离去成为悟空心中永远的痛，也让他彻底断绝了尘缘，一心护送唐僧西天取经。', chars: ['sunwukong', 'zixia', 'niumowang'] },
    { key: 'plot7', name: '城楼一吻', desc: '孙悟空看到夕阳武士与转世的紫霞在城楼上对峙，他借夕阳武士之身，给了紫霞一个深情的吻，了却了自己未了的尘缘。', chars: ['sunwukong', 'xiyangwushi', 'zixia'] },
    { key: 'plot8', name: '西天取经', desc: '孙悟空转身离去，在"他好像一条狗"的议论声中，踏上了漫漫西行路。他的背影孤独而坚定，象征着成长与责任的代价。', chars: ['sunwukong', 'tangsanzang'] }
  ],
