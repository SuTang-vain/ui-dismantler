<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>如果没有这7件事，读懂三国才女黄月英藏于卧龙身后的智慧传奇</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        overflow: hidden;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f8f8f8;
        font-family:
          -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei",
          sans-serif;
      }

      :root {
        --primary: #6487fa;
        --primary-dark: #5274f2;
        --primary-light: rgba(100, 135, 250, 0.1);
        --bg-white: #ffffff;
        --bg-gray: #f8f8f8;
        --text-main: #1e1f24;
        --text-secondary: #848691;
        --text-tertiary: #b7b9c1;
        --border-light: rgba(30, 31, 36, 0.06);
        --shadow-sm: 0 2px 8px rgba(30, 31, 36, 0.06);
        --shadow-lg: 0 12px 36px rgba(30, 31, 36, 0.12);
        --radius-md: 10px;
        --radius-lg: 12px;
        --cause-color: #6487fa;
      }

      #app-container {
        width: 788px;
        height: 492px;
        position: relative;
        overflow: hidden;
        border-radius: var(--radius-lg);
        background: var(--bg-white);
        box-shadow: var(--shadow-lg);
      }

      /* ========== Timeline (top) ========== */
      .timeline-nav {
        height: 66px;
        padding: 8px 14px;
        display: flex;
        align-items: stretch;
        gap: 6px;
        background: linear-gradient(180deg, #ffffff 0%, #f8f8f8 100%);
        border-bottom: 1px solid var(--border-light);
      }
      .timeline-node {
        flex: 1;
        min-width: 0;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        padding: 6px 4px;
        border-radius: var(--radius-md);
        border: 1px solid var(--border-light);
        background: #fff;
        transition:
          transform 0.22s ease,
          box-shadow 0.22s ease,
          border-color 0.22s ease,
          background 0.22s ease;
      }
      .timeline-node:hover {
        transform: translateY(-2px);
        background: #fff;
        border-color: rgba(100, 135, 250, 0.28);
        box-shadow: 0 6px 14px rgba(100, 135, 250, 0.1);
      }
      .timeline-node.active {
        background: var(--primary-light);
        border-color: rgba(100, 135, 250, 0.42);
        box-shadow: 0 8px 18px rgba(100, 135, 250, 0.14);
      }
      .timeline-node .tname {
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 13px;
        line-height: 1.25;
        color: var(--text-main);
        font-weight: 800;
      }
      .timeline-node .year {
        margin-top: 3px;
        font-size: 11px;
        line-height: 1.15;
        color: var(--text-secondary);
        font-weight: 600;
      }
      .timeline-node.active .tname {
        color: var(--primary);
      }
      .timeline-node.active .year {
        color: var(--text-main);
      }
      .timeline-arrow {
        color: var(--text-tertiary);
        font-size: 11px;
        flex-shrink: 0;
        align-self: center;
      }

      /* ========== Main ========== */
      .main-area {
        height: calc(100% - 66px);
        display: flex;
        padding: 10px 12px;
        gap: 10px;
      }

      /* Horizontal category buttons */
      .tabs-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        width: 100%;
        flex-shrink: 0;
        margin-bottom: 8px;
      }
      .tab-btn {
        font-size: 13px;
        font-weight: 800;
        padding: 8px 10px;
        border-radius: var(--radius-md);
        cursor: pointer;
        color: var(--text-main);
        background: #fff;
        border: 1px solid rgba(100, 135, 250, 0.22);
        transition: all 0.2s;
        letter-spacing: 0;
        box-shadow: var(--shadow-sm);
      }
      .tab-btn.active {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
        box-shadow: 0 6px 14px rgba(100, 135, 250, 0.24);
      }
      .tab-btn:hover:not(.active) {
        background: var(--primary-light);
        color: var(--primary);
      }

      /* Content area */
      .content-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 0;
        min-width: 0;
      }

      /* Event header */
      .event-header {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 8px;
        padding: 8px 10px;
        border-radius: var(--radius-md);
        background: var(--bg-gray);
        border: 1px solid var(--border-light);
      }
      .event-icon {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 17px;
        flex-shrink: 0;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-dark)
        );
        color: #fff;
        object-fit: cover;
        border: 1px solid var(--border-light);
      }
      .event-title {
        min-width: 0;
        flex: 1;
      }
      .event-title-line {
        display: flex;
        align-items: baseline;
        gap: 8px;
        flex-wrap: wrap;
      }
      .event-name {
        font-size: 18px;
        font-weight: 900;
        color: var(--text-main);
        line-height: 1.15;
      }
      .event-period {
        font-size: 12px;
        color: var(--text-secondary);
        font-weight: 700;
      }
      .event-summary {
        margin-top: 4px;
        font-size: 14px;
        line-height: 1.4;
        color: var(--text-main);
        font-weight: 500;
      }
      .summary-time {
        display: none;
        color: var(--primary);
        font-weight: 800;
      }

      /* Four modules */
      .module-area {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      .modules-grid {
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .info-module {
        min-height: 0;
        padding: 9px 10px;
        border-radius: var(--radius-md);
        background: #fff;
        border: 1px solid rgba(100, 135, 250, 0.14);
        box-shadow: var(--shadow-sm);
        display: flex;
        flex-direction: column;
        gap: 7px;
        overflow: hidden;
      }
      .info-module.compact {
        padding: 8px 10px;
        gap: 5px;
      }
      .module-title {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        flex-shrink: 0;
        height: 24px;
        border-radius: 8px;
        color: var(--primary);
        background: var(--primary-light);
        font-size: 13px;
        line-height: 1;
        font-weight: 900;
      }
      .module-title::before,
      .module-title::after {
        content: "";
        width: 18px;
        height: 1px;
        background: rgba(100, 135, 250, 0.35);
      }
      .module-list {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        gap: 5px;
        list-style: none;
      }
      .module-list-item {
        position: relative;
        padding-left: 14px;
        font-size: 13px;
        line-height: 1.5;
        color: var(--text-main);
        font-weight: 500;
        word-break: normal;
        overflow-wrap: normal;
        white-space: normal;
      }
      .module-list-item::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0.62em;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--primary);
        transform: translateY(-50%);
      }
      .module-list-label {
        display: inline-block;
        margin-right: 4px;
        font-size: 13px;
        font-weight: 900;
        color: var(--primary);
        white-space: nowrap;
      }

      /* Highlight tags */
      .hl {
        font-weight: 700;
        color: var(--primary);
      }
      .hl-year {
        display: inline-block;
        background: rgba(100, 135, 250, 0.12);
        color: var(--primary);
        padding: 0 5px;
        border-radius: 3px;
        font-weight: 700;
        font-size: 11px;
      }
      .hl-place {
        display: inline-block;
        background: rgba(100, 135, 250, 0.1);
        color: var(--primary);
        padding: 0 5px;
        border-radius: 3px;
        font-weight: 600;
        font-size: 11px;
      }
      .hl-num {
        display: inline-block;
        background: rgba(100, 135, 250, 0.12);
        color: var(--primary);
        padding: 0 5px;
        border-radius: 3px;
        font-weight: 700;
        font-size: 11px;
      }
      .hl-person {
        display: inline-block;
        background: rgba(100, 135, 250, 0.1);
        color: var(--primary);
        padding: 0 5px;
        border-radius: 3px;
        font-weight: 600;
        font-size: 11px;
      }

      /* ========== Right panel ========== */
      .right-col {
        width: 190px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .event-image {
        height: 164px;
        border-radius: var(--radius-md);
        overflow: hidden;
        position: relative;
        border: 1px solid var(--border-light);
        background: var(--bg-gray);
        box-shadow: var(--shadow-sm);
      }
      .event-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .event-image .img-caption {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 22px 10px 7px;
        font-size: 13px;
        line-height: 1.25;
        color: #fff;
        text-align: center;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.68));
        font-weight: 800;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .people-box {
        flex: 1;
        padding: 10px;
        background: var(--bg-gray);
        border-radius: var(--radius-md);
        border: 1px solid var(--border-light);
        display: flex;
        flex-direction: column;
      }
      .people-box .p-title {
        font-size: 13px;
        font-weight: 900;
        color: var(--text-main);
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .people-box .p-title .p-hint {
        font-size: 11px;
        font-weight: 700;
        color: var(--primary);
        background: var(--primary-light);
        padding: 2px 7px;
        border-radius: 999px;
      }
      .people-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex: 1;
      }
      .people-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 8px;
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid rgba(100, 135, 250, 0.18);
        background: #fff;
        box-shadow: 0 1px 3px rgba(30, 31, 36, 0.04);
      }
      .people-item:hover {
        background: var(--primary-light);
        border-color: var(--primary);
        transform: translateY(-1px);
        box-shadow: 0 6px 14px rgba(100,135,250,0.18);
      }
      .people-item::after {
        content: "查看 ›";
        font-size: 11px;
        color: var(--primary);
        margin-left: auto;
        font-weight: 800;
        background: var(--primary-light);
        padding: 2px 7px;
        border-radius: 999px;
        flex-shrink: 0;
      }
      .people-item:hover::after {
        background: var(--primary);
        color: #fff;
      }
      .people-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px solid var(--border-light);
        flex-shrink: 0;
      }
      .people-item-name {
        font-size: 14px;
        color: var(--text-main);
        font-weight: 800;
      }
      .people-item-role {
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: 1px;
      }

      /* ========== Modal ========== */
      .modal-overlay {
        display: none;
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(3px);
        z-index: 100;
        justify-content: center;
        align-items: center;
      }
      .modal-overlay.active {
        display: flex;
      }
      .modal-content {
        background: var(--bg-white);
        border-radius: var(--radius-lg);
        width: 340px;
        padding: 20px;
        transform: scale(0.92);
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        box-shadow: var(--shadow-lg);
        position: relative;
        display: flex;
        gap: 14px;
      }
      .modal-overlay.active .modal-content {
        transform: scale(1);
        opacity: 1;
      }
      .modal-close {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.06);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        color: var(--text-main);
        font-weight: 700;
      }
      .modal-close:hover {
        background: rgba(0, 0, 0, 0.12);
      }
      .modal-avatar {
        width: 56px;
        height: 56px;
        border-radius: 10px;
        object-fit: cover;
        flex-shrink: 0;
        border: 2px solid var(--primary-light);
      }
      .modal-info {
        flex: 1;
      }
      .modal-person-name {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-main);
      }
      .modal-person-role {
        font-size: 12px;
        color: var(--primary);
        font-weight: 600;
        margin: 2px 0 8px;
      }
      .modal-person-desc {
        font-size: 13px;
        line-height: 1.7;
        color: var(--text-main);
      }

      /* ========== WISE Mobile ========== */
      .mobile-hero,
      .mobile-people {
        display: none;
      }
      @media (max-width: 480px), (max-height: 480px) {
        #app-container {
          width: 380px;
          height: 456px;
          border-radius: 10px;
        }

        .timeline-nav {
          height: 52px;
          padding: 5px 7px;
          gap: 6px;
          overflow-x: auto;
          overflow-y: hidden;
          scroll-snap-type: x proximity;
          -webkit-overflow-scrolling: touch;
          scrollbar-width: none;
        }
        .timeline-nav::-webkit-scrollbar {
          display: none;
        }
        .timeline-node {
          flex: 0 0 calc((100% - 18px) / 3.5);
          padding: 5px 6px;
          border-radius: 8px;
          scroll-snap-align: start;
          border: 1px solid rgba(100, 135, 250, 0.35);
          box-shadow: 0 1px 3px rgba(100,135,250,0.08);
        }
        .timeline-node.active {
          background: var(--primary);
        }
        .timeline-node.active .tname {
          color: #fff;
        }
        .timeline-node .tname {
          font-size: 12.5px;
          line-height: 1.15;
          font-weight: 900;
        }
        .timeline-node .year {
          display: none;
        }
        .timeline-arrow {
          display: none;
        }

        .main-area {
          height: calc(100% - 52px);
          padding: 7px 8px;
          gap: 0;
          flex-direction: column;
        }
        .content-area {
          flex: 1;
          gap: 0;
          min-height: 0;
        }
        .event-header {
          display: none;
        }
        .mobile-hero {
          display: grid;
          grid-template-columns: 118px 1fr;
          gap: 8px;
          margin-bottom: 6px;
          height: 100px;
          min-height: 100px;
        }
        .mobile-event-image {
          position: relative;
          overflow: hidden;
          border-radius: 9px;
          border: 1px solid var(--border-light);
          box-shadow: var(--shadow-sm);
          height: 100px;
        }
        .mobile-event-image img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          display: block;
        }
        .mobile-event-image .img-caption {
          position: absolute;
          left: 0;
          right: 0;
          bottom: 0;
          padding: 12px 5px 3px;
          font-size: 10px;
          line-height: 1.1;
          color: #fff;
          text-align: center;
          background: linear-gradient(transparent, rgba(0, 0, 0, 0.68));
          font-weight: 800;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }
        .mobile-title-card {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 7px;
          min-width: 0;
          padding: 7px 8px;
          border-radius: 9px;
          background: var(--bg-gray);
          border: 1px solid var(--border-light);
        }
        .mobile-title-card .event-title {
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-self: stretch;
        }
        .mobile-title-card .event-icon {
          width: 28px;
          height: 28px;
          font-size: 14px;
          border-radius: 8px;
        }
        .mobile-title-card .event-name {
          font-size: 15px;
        }
        .mobile-title-card .event-period {
          font-size: 10px;
        }
        .mobile-title-card .event-summary {
          font-size: 12.5px;
          line-height: 1.45;
          margin-top: 4px;
        }

        .module-area {
          display: flex;
          flex-direction: column;
          min-height: 0;
          flex: 1;
        }
        .module-tabs {
          display: grid;
          grid-template-columns: repeat(4, 1fr);
          gap: 5px;
          margin-bottom: 6px;
          flex-shrink: 0;
        }
        .module-tab {
          height: 28px;
          border-radius: 8px;
          border: 1px solid rgba(100, 135, 250, 0.22);
          background: #fff;
          color: var(--text-main);
          font-size: 12px;
          font-weight: 900;
          box-shadow: var(--shadow-sm);
          cursor: pointer;
        }
        .module-tab.active {
          background: var(--primary);
          color: #fff;
          border-color: var(--primary);
        }
        .modules-grid {
          display: block;
          flex: 1;
          min-height: 0;
        }
        .info-module {
          height: 100%;
          padding: 7px 9px;
          gap: 4px;
          border-radius: 9px;
          overflow: hidden;
        }
        .info-module .module-list,
        .info-module.open .module-list {
          max-height: none;
          opacity: 1;
          overflow: hidden;
          justify-content: flex-start;
          gap: 4px;
        }
        .info-module .module-title .arrow {
          display: none;
        }
        .module-title {
          display: none;
        }
        .module-list {
          justify-content: flex-start;
          gap: 4px;
        }
        .module-list-item {
          padding-left: 12px;
          font-size: 12px;
          line-height: 1.4;
        }
        .module-list-item::before {
          width: 5px;
          height: 5px;
          top: 0.65em;
        }
        .module-list-label {
          font-size: 12px;
          margin-right: 3px;
        }
        .module-list .hl,
        .module-list .hl-year,
        .module-list .hl-place,
        .module-list .hl-num,
        .module-list .hl-person {
          background: transparent;
          padding: 0;
          color: var(--primary);
          font-weight: 900;
        }

        .right-col {
          display: none;
        }
        .mobile-people {
          display: flex;
          align-items: center;
          gap: 6px;
          flex-shrink: 0;
          margin-top: 6px;
          padding: 6px;
          background: var(--bg-gray);
          border-radius: var(--radius-md);
          border: 1px solid var(--border-light);
        }
        .mobile-people .mp-label {
          font-size: 11px;
          color: var(--text-main);
          font-weight: 900;
          white-space: nowrap;
        }
        .mobile-people .mp-list {
          display: flex;
          gap: 4px;
          flex-wrap: nowrap;
          flex: 1;
          min-width: 0;
        }
        .mobile-people .mp-tag {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 3px;
          flex: 1;
          min-width: 0;
          padding: 4px 6px;
          border-radius: 12px;
          font-size: 11.5px;
          font-weight: 800;
          background: var(--primary-light);
          color: var(--primary);
          border: 1px solid var(--primary);
          cursor: pointer;
          white-space: nowrap;
          box-shadow: 0 2px 6px rgba(100,135,250,0.18);
        }
        .mobile-people .mp-tag::after {
          content: "›";
          font-weight: 900;
          margin-left: 2px;
        }
        .mobile-people .mp-tag.opponent {
          background: rgba(232, 89, 12, 0.08);
          color: var(--cause-color);
          border-color: rgba(232, 89, 12, 0.2);
        }
        .mobile-people .mp-tag .mp-dot {
          width: 5px;
          height: 5px;
          border-radius: 50%;
          background: currentColor;
          flex-shrink: 0;
        }

        .modal-content {
          width: 300px;
          padding: 16px;
          gap: 10px;
        }
        .modal-avatar {
          width: 44px;
          height: 44px;
        }
        .modal-person-name {
          font-size: 15px;
        }
        .modal-person-desc {
          font-size: 13px;
          line-height: 1.6;
        }
      }

      @media (max-width: 320px), (max-height: 365px) {
        #app-container {
          width: 300px;
          height: 360px;
        }
        .timeline-nav {
          height: 42px;
          padding: 4px 5px;
          gap: 5px;
        }
        .timeline-node {
          flex-basis: calc((100% - 15px) / 3.5);
          padding: 4px 5px;
        }
        .timeline-node .tname {
          font-size: 11px;
          line-height: 1.12;
        }
        .timeline-node .year {
          display: none;
        }
        .main-area {
          height: calc(100% - 38px);

      function setupSplash() {
        const splash = document.getElementById("splash");
        const opts = document.querySelectorAll(".splash-opt");
        opts.forEach((opt) => {
          opt.addEventListener("click", () => {
            opts.forEach((o) => o.classList.remove("picked"));

          setTimeout(() => (splash.style.display = "none"), 350);

      function renderTimeline() {
        const nav = document.getElementById("timelineNav");
        let html = "";
        events.forEach((e, i) => {
          if (i > 0) html += '<span class="timeline-arrow">→</span>';
          html += `<div class="timeline-node ${i === currentIndex ? "active" : ""}" data-idx="${i}" role="button" tabindex="0" title="点击切换到：${e.name}" onclick="goTo(${i})" onkeydown="handleTimelineKey(event, ${i})">
      <span class="tname">${e.name}</span><span class="year">${e.year}</span>
    </div>`;
        });
        nav.innerHTML = html;
        if (isMobile()) {
          requestAnimationFrame(() => {
            nav
              .querySelector(".timeline-node.active")
              ?.scrollIntoView({
                inline: "center",
                block: "nearest",
                behavior: "smooth",
              });
          });
        }
        // 渲染因果连线 SVG（双 rAF 确保布局完成）
        requestAnimationFrame(() =>
          requestAnimationFrame(() => renderCauseChainSVG())
        );
      }

      function renderCauseChainSVG() {
        const nav = document.getElementById("timelineNav");
        if (!nav || isMobile()) return;
        // 移除旧 svg
        nav.querySelectorAll(".cause-chain-svg").forEach((s) => s.remove());
        const navRect = nav.getBoundingClientRect();
        const nodes = nav.querySelectorAll(".timeline-node");
        if (!nodes.length) return;
        const positions = Array.from(nodes).map((n) => {
          const r = n.getBoundingClientRect();
          return {
            cx: r.left + r.width / 2 - navRect.left,
            top: r.top - navRect.top,
            bottom: r.bottom - navRect.top,
          };
        });
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("class", "cause-chain-svg");
        svg.setAttribute("width", navRect.width);
        svg.setAttribute("height", navRect.height);
        // 与当前选中相邻的因果对算"亮"
        causeChain.forEach((c) => {
          if (c.from >= positions.length || c.to >= positions.length) return;
          const a = positions[c.from];
          const b = positions[c.to];
          const y = Math.max(a.bottom, b.bottom) - 2;
          const midY = y + 8;
          const path = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "path"
          );
          const d = `M ${a.cx} ${a.bottom - 4} Q ${(a.cx + b.cx) / 2} ${midY + 4} ${b.cx} ${b.bottom - 4}`;
          path.setAttribute("d", d);
          if (c.from === currentIndex || c.to === currentIndex) {
            path.classList.add("lit");
          }
          svg.appendChild(path);
        });
        nav.appendChild(svg);
        // 高亮链路上的节点
        nodes.forEach((n, i) => {
          n.classList.toggle(
            "in-chain",
            causeChain.some(
              (c) =>
                (c.from === currentIndex && c.to === i) ||
                (c.to === currentIndex && c.from === i)
            )
          );
        });
      }

      function normalizeFlowText(text) {
        return text
          .replace(/<br\s*\/?>/gi, "，")
          .replace(/，+/g, "，")
          .replace(/，；/g, "；");
      }

      function mergeFlowItems(flowData) {
        const items = flowData
          .filter((node) => node.type !== "cause" && node.type !== "effect")
          .map((node) => ({ ...node, text: normalizeFlowText(node.text) }));
        const prefix = flowData.find((node) => node.type === "cause");
        const suffix = [...flowData]
          .reverse()
          .find((node) => node.type === "effect");
        if (prefix && items[0])
          items[0].text = `${normalizeFlowText(prefix.text)}；${items[0].text}`;
        if (suffix && items.length)
          items[items.length - 1].text =
            `${items[items.length - 1].text}；${normalizeFlowText(suffix.text)}`;
        return items.length
          ? items
          : flowData.map((node) => ({
              label: "要点",
              text: normalizeFlowText(node.text),
            }));
      }

      function renderListItem(node) {
        const label = node.label || "要点";
        return `<li class="module-list-item"><span class="module-list-label">${label}</span>${node.text}</li>`;
      }

      function getModuleClass(items) {
        const textLength = items.reduce(
          (sum, item) => sum + item.text.replace(/<[^>]+>/g, "").length,
          0,
        );
        return items.length <= 2 || textLength < 46 ? "compact" : "";
      }

      function renderModules(event) {
        return tabKeys
          .map((key, idx) => {
            const items = mergeFlowItems(event.flows[key]);
            const openByDefault = idx === 0 ? "open" : "";
            return `
      <section class="info-module ${openByDefault}" data-key="${key}" onclick="toggleAccordion(this)">
        <div class="module-title">${key}<span class="arrow">▾</span></div>
        <ul class="module-list">${items.map(renderListItem).join("")}</ul>
      </section>
    `;
          })
          .join("");
      }

      function toggleAccordion(el) {
        const wasOpen = el.classList.contains("open");
        el.parentElement
          .querySelectorAll(".info-module")
          .forEach((m) => m.classList.remove("open"));
        if (!wasOpen) el.classList.add("open");
        else el.classList.add("open"); // 至少保留一个展开
      }

      function toggleModule(el) {
        // 兼容旧调用：转发到手风琴
        toggleAccordion(el);
      }

      function renderModuleTabs() {
        return tabKeys
          .map(
            (key) =>
              `<button class="module-tab ${key === currentTab ? "active" : ""}" onclick="switchTab('${key}')">${key}</button>`,
          )
          .join("");
      }

      function renderSingleModule(event, key) {
        let items = mergeFlowItems(event.flows[key]);
        // 移动端最多展示 4 条要点，避免溢出
        if (isMobile() && items.length > 4) {
          // 保留首条+末两条+第二条，共 4 条最关键
          items = [items[0], items[1], items[items.length - 2], items[items.length - 1]];
        }
        return `
    <section class="info-module open mobile-single">
      <div class="module-title">${key}</div>
      <ul class="module-list">${items.map(renderListItem).join("")}</ul>
    </section>
  `;
      }

      function renderMain() {
        const e = events[currentIndex];
        const area = document.getElementById("mainArea");

        const modulesHtml = renderModules(e);
        const moduleTabsHtml = renderModuleTabs();
        const activeModuleHtml = renderSingleModule(e, currentTab);

        if (isMobile()) {
          area.innerHTML = `
      <div class="content-area">
        <div class="mobile-hero">
          <div class="mobile-event-image"><img src="${e.image}" alt="${e.name}" loading="lazy" decoding="async" width="118" height="100" /><div class="img-caption">${e.imageCaption}</div></div>
          <div class="mobile-title-card">
            <div class="event-title">
              <div class="event-title-line"><span class="event-name">${e.name}</span><span class="event-period">${e.time}</span><button class="whatif-btn" onclick="showWhatIf(${currentIndex})">🤔 如果?</button></div>
              <div class="event-summary"><span class="summary-time">${e.year} · ${e.time}｜</span>${e.summary}</div>
            </div>
          </div>
        </div>
        <div class="module-area">
          <div class="module-tabs">${moduleTabsHtml}</div>
          <div class="modules-grid">${activeModuleHtml}</div>
        </div>
        <div class="mobile-people">
          <span class="mp-label">核心人物</span>
          <div class="mp-list">
            ${e.people.map((p) => `<div class="mp-tag ${p.side === "opponent" ? "opponent" : ""}" onclick="showPerson('${p.name}','${p.role}',\`${p.desc}\`,'${p.avatar}')"><span class="mp-dot"></span>${p.name}</div>`).join("")}
          </div>
        </div>
      </div>
    `;
        } else {
          area.innerHTML = `
      <div class="content-area">
        <div class="event-header">
          <img class="event-icon" src="${e.image}" alt="${e.name}" loading="lazy" decoding="async" width="34" height="34" />
          <div class="event-title">
            <div class="event-title-line"><span class="event-name">${e.name}</span><span class="event-period">${e.time}</span><button class="whatif-btn" onclick="showWhatIf(${currentIndex})">🤔 如果当年没发生？</button></div>
            <div class="event-summary"><span class="summary-time">${e.year} · ${e.time}｜</span>${e.summary}</div>
          </div>
        </div>
        <div class="module-area">
          <div class="modules-grid">${modulesHtml}</div>
        </div>
      </div>
      <div class="right-col">
        <div class="event-image">
          <img src="${e.image}" alt="${e.name}" loading="lazy" decoding="async" width="190" height="164" />
          <div class="img-caption">${e.imageCaption}</div>
        </div>
        <div class="people-box">
          <div class="p-title">核心人物</div>
          <div class="people-list">
            ${e.people
              .map(
                (p) => `
              <div class="people-item" onclick="showPerson('${p.name}','${p.role}',\`${p.desc}\`,'${p.avatar}')">
                <img class="people-avatar" src="${p.avatar}" alt="${p.name}" loading="lazy" decoding="async" width="30" height="30" />
                <div><div class="people-item-name">${p.name}</div><div class="people-item-role">${p.role}</div></div>
              </div>
            `,
              )
              .join("")}
          </div>
        </div>
      </div>
    `;
        }
      }

      function handleTimelineKey(event, index) {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          goTo(index);
        }
      }

      function goTo(index) {
        if (index < 0 || index >= events.length) return;
        currentIndex = index;
        currentTab = "背景";
        renderTimeline();
        renderMain();
        markVisited(index);
      }

      function showWhatIf(idx) {
        const data = whatIf[idx] || {
          q: "如果这件事没发生？",
          real: events[idx]?.summary || "",
          alt: "历史可能完全改写。",
          foot: ""
        };
        document.getElementById("whatifQ").textContent = data.q;
        document.getElementById("whatifReal").textContent = data.real;
        document.getElementById("whatifAlt").textContent = data.alt;
        document.getElementById("whatifFoot").textContent = data.foot;
        document.getElementById("whatifOverlay").classList.add("active");
      }

      function switchTab(key) {
        currentTab = key;
        renderMain();
      }

      function showPerson(name, role, desc, avatar) {
        document.getElementById("modalBody").innerHTML = `
    <img class="modal-avatar" src="${avatar}" alt="${name}" loading="lazy" decoding="async" width="56" height="56" />
    <div class="modal-info">
      <div class="modal-person-name">${name}</div>
      <div class="modal-person-role">${role}</div>
      <div class="modal-person-desc">${desc}</div>
    </div>
  `;
        document.getElementById("modalOverlay").classList.add("active");
      }

      document
        .getElementById("modalClose")
        .addEventListener("click", () =>
          document.getElementById("modalOverlay").classList.remove("active"),
        );
      document.getElementById("modalOverlay").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) e.target.classList.remove("active");
      });
      document.getElementById("whatifClose").addEventListener("click", () => {
        document.getElementById("whatifOverlay").classList.remove("active");
      });
      document.getElementById("whatifOverlay").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) e.target.classList.remove("active");
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft") goTo(currentIndex - 1);
        else if (e.key === "ArrowRight") goTo(currentIndex + 1);
        else if (e.key === "Escape") {
          document.getElementById("modalOverlay").classList.remove("active");
          document.getElementById("whatifOverlay").classList.remove("active");
        }
      });
      let touchStartX = 0;
      document.getElementById("app-container").addEventListener(
        "touchstart",
        (e) => {
          touchStartX = e.touches[0].clientX;
        },
        { passive: true },
      );
      document.getElementById("app-container").addEventListener(
        "touchend",
        (e) => {
          const diff = e.changedTouches[0].clientX - touchStartX;
          if (Math.abs(diff) > 50) {
            diff > 0 ? goTo(currentIndex - 1) : goTo(currentIndex + 1);
          }
        },
        { passive: true },
      );

      let lastMobile = isMobile();
      let resizeTimer = null;
      window.addEventListener("resize", () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          const nowMobile = isMobile();
          if (nowMobile !== lastMobile) {
            lastMobile = nowMobile;
            renderTimeline();
            renderMain();
          }
        }, 150);
      });

      renderTimeline();
      renderMain();
      setupSplash();
      markVisited(0);
      window.addEventListener("resize", () => requestAnimationFrame(renderCauseChainSVG));
    </script>
  </body>
</html>
