<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>秦始皇 · 七大事件与人物关系</title><link rel="stylesheet" href="../src/qinshihuang.css"></head><body><div id="mount"></div><script id="sg-event-data" type="application/json">[{"name":"平定内乱","year":"前247-前238","period":"战国末期","image":"即位秦王与平定内乱.png","summary":"少年嬴政13岁继位，隐忍蓄势；亲政后雷霆平定嫪毐叛乱、罢黜权臣吕不韦，一举收回大权。","summaryShort":"少年嬴政隐忍蓄势，亲政后平嫪毐之乱、罢黜吕不韦，收回大权。","people":[{"name":"嬴政","role":"秦王（少年）","avatar":"秦始皇.png","big":true,"deed":"13岁继位无实权，隐忍蓄力；前238年行冠礼亲政，雷霆平定嫪毐叛乱，次年罢黜吕不韦。","impact":"结束权臣干政、独掌大权，为日后统一六国扫清内部障碍。"},{"name":"吕不韦","role":"相国 · 仲父","avatar":"吕不韦.png","rel":"ruler","deed":"以商贾之资拥立庄襄王，把持朝政十余年，编《吕氏春秋》立威。","impact":"权势过盛终遭清算，受嫪毐案牵连被免相，饮鸩自尽。"},{"name":"嫪毐","role":"长信侯","avatar":"嫪毐.png","rel":"enemy","deed":"凭太后宠信封侯专权，前238年趁冠礼举兵叛乱，攻蕲年宫。","impact":"叛乱被迅速平定，本人车裂灭族，成嬴政亲政的第一块试金石。"},{"name":"李斯","role":"客卿","avatar":"李斯.png","rel":"ruler","deed":"上《谏逐客书》劝止逐客令，力陈重用客卿谋士之利。","impact":"获嬴政赏识跻身决策层，开启辅佐统一的仕途。"},{"name":"王翦","role":"秦军宿将","avatar":"王翦.png","rel":"ruler","deed":"亲政后受嬴政倚重，统兵弹压内外，稳定动荡局势。","impact":"成为嬴政掌控军权的支柱，为灭六国储备统帅之才。"}],"links":[{"a":"吕不韦","b":"嫪毐","type":"enemy","label":"明争"},{"a":"吕不韦","b":"李斯","type":"ally","label":"举荐"}]},{"name":"一统天下","year":"前230-前221","period":"战国末期","image":"攻灭六国一统天下.png","summary":"远交近攻、各个击破，九年内先后灭韩赵魏楚燕齐六国，结束数百年分裂，建立中国首个大一统王朝。","summaryShort":"远交近攻、各个击破，九年灭六国，建立首个大一统王朝。","people":[{"name":"秦始皇","role":"秦王 · 开国之君","avatar":"秦始皇.png","big":true,"deed":"定下灭国方略并总揽全局，前221年灭齐完成统一，废王号自称『皇帝』。","impact":"结束战国割据，开创中央集权大一统格局，功盖千古。"},{"name":"王翦","role":"秦军主将","avatar":"王翦.png","rel":"ruler","deed":"率六十万大军灭楚，父子并肩横扫赵、燕，是统一战争的军事支柱。","impact":"为秦扫平最强对手，奠定疆域基础，功成后急流勇退保全身家。"},{"name":"李斯","role":"廷尉","avatar":"李斯.png","rel":"ruler","deed":"制定『远交近攻、先弱后强』总战略，主持外交离间六国。","impact":"以谋略加速六国瓦解，成为秦廷首席文臣，晋位丞相。"},{"name":"蒙恬","role":"秦军将领","avatar":"蒙恬.png","rel":"ruler","deed":"出身将门，随军攻齐等战役屡立战功，崭露统帅锋芒。","impact":"积累战功与威望，为日后独当北疆、统兵御匈奴埋下伏笔。"},{"name":"冯去疾","role":"重臣","avatar":"冯去疾.png","rel":"ruler","deed":"参与统一大业的朝政筹划与后方治理，保障前线军需政令。","impact":"成为新朝倚重的行政骨干，跻身秦廷核心重臣之列。"}],"links":[{"a":"王翦","b":"蒙恬","type":"ally","label":"同袍"},{"a":"李斯","b":"冯去疾","type":"ally","label":"同朝"}]},{"name":"创立帝制","year":"前221起","period":"秦始皇帝时期","image":"创立帝制与中央集权制度.png","summary":"废分封、立郡县，首创『皇帝』称号，设三公九卿，确立中央集权官僚体制，为后世两千年政制奠基。","summaryShort":"首创皇帝称号，废分封立郡县、设三公九卿，奠定中央集权。","people":[{"name":"秦始皇","role":"始皇帝","avatar":"秦始皇.png","big":true,"deed":"取『三皇五帝』之尊称『始皇帝』，拍板废分封、行郡县，构建中央集权框架。","impact":"皇权登顶，开创皇帝制度，『百代都行秦政法』影响深远。"},{"name":"李斯","role":"丞相","avatar":"李斯.png","rel":"ruler","deed":"力排众议主张废分封、行郡县，主持设计三公九卿与秦律体系。","impact":"成为帝制的总设计师，官至丞相，权倾一时。"},{"name":"冯去疾","role":"右丞相","avatar":"冯去疾.png","rel":"ruler","deed":"与李斯同列丞相，参与新朝制度制定，统辖百官庶政。","impact":"位极人臣，成为中央集权体制运转的行政中枢。"},{"name":"王绾","role":"丞相（主分封）","avatar":"王绾.png","rel":"ruler","deed":"身为丞相主张沿袭分封制、分封诸子镇守边地，与李斯就郡县存废激烈论争。","impact":"分封主张被否决，郡县制得以确立，其议成秦制抉择的反面参照。"}],"links":[{"a":"李斯","b":"王绾","type":"enemy","label":"廷辩"}]},{"name":"书同文","year":"前221-前210","period":"秦始皇帝时期","image":"统一度量衡文字货币车轨.png","summary":"书同文、车同轨，废六国旧钱行秦半两，统一度量衡，消弭地域壁垒，夯实大一统的经济文化根基。","summaryShort":"书同文、车同轨，统一货币度量衡，夯实大一统根基。","people":[{"name":"秦始皇","role":"始皇帝","avatar":"秦始皇.png","big":true,"deed":"下诏推行『书同文、车同轨』，统一货币与度量衡，颁行标准器具。","impact":"打破地域隔阂，汉字成为中华民族核心纽带，统一根基更牢。"},{"name":"李斯","role":"丞相","avatar":"李斯.png","rel":"ruler","deed":"主持文字统一，以小篆为官方标准字体，亲书《仓颉篇》为范本。","impact":"『书同文』得以落地，小篆通行天下，文化传承与政令畅达。"},{"name":"程邈","role":"狱吏","avatar":"程邈.png","rel":"ruler","deed":"整理简化篆书笔画，创制便于书写的隶书，献于朝廷。","impact":"隶书大大提高书写效率，推动文字在吏民间普及应用。"},{"name":"冯去疾","role":"右丞相","avatar":"冯去疾.png","rel":"ruler","deed":"统筹度量衡与货币标准的推行落实，督办各郡县执行。","impact":"保障统一政策在全国范围切实落地，经济商贸趋于规范。"}],"links":[{"a":"李斯","b":"程邈","type":"ally","label":"定文字"}]},{"name":"北击匈奴","year":"前215-前214","period":"秦始皇帝中后期","image":"北击匈奴南征百越修筑长城.png","summary":"命蒙恬率三十万大军北逐匈奴、收复河套，连筑万里长城；南征百越置郡，疆域拓至顶峰，边防体系成型。","summaryShort":"蒙恬北逐匈奴、连筑长城，南征百越置郡，疆域达于顶峰。","people":[{"name":"秦始皇","role":"始皇帝","avatar":"秦始皇.png","big":true,"deed":"决策主动出击安定边疆，命蒙恬北伐、连筑长城，遣军南征百越置三郡。","impact":"疆域达于顶峰，奠定古代中国版图雏形，然徭役繁重埋下隐患。"},{"name":"蒙恬","role":"大将军","avatar":"蒙恬.png","rel":"ruler","deed":"前215年率三十万军北击匈奴，收复河套逐敌至阴山，主持连筑万里长城。","impact":"长城成两千年北疆屏障，蒙恬威震匈奴，成秦军北疆柱石。"},{"name":"任嚣","role":"南征主将","avatar":"任嚣.png","rel":"ruler","deed":"统兵南征百越、平定岭南，设桂林等三郡并出任南海尉。","impact":"将岭南纳入中原版图，开启南方开发与汉化进程。"},{"name":"扶苏","role":"长子 · 监军","avatar":"扶苏.png","rel":"family","deed":"因直谏忤旨被遣往上郡，监蒙恬之军，戍守北疆。","impact":"远离权力中枢，为日后沙丘政变中被矫诏赐死埋下祸根。"}],"links":[{"a":"蒙恬","b":"扶苏","type":"ally","label":"共戍"}]},{"name":"焚书坑儒","year":"前213-前212","period":"秦始皇帝晚年","image":"焚书坑儒与晚年暴政.png","summary":"为统一思想焚《诗》《书》禁私学，坑杀方士儒生四百余人；大兴土木严刑苛法，社会矛盾急剧激化。","summaryShort":"焚书禁私学、坑杀方士儒生，严刑苛法致社会矛盾激化。","people":[{"name":"秦始皇","role":"始皇帝","avatar":"秦始皇.png","big":true,"deed":"采纳李斯之议焚书禁私学，因方士欺瞒震怒而坑杀儒生方士，大兴徭役。","impact":"思想文化遭重创，民心渐失，成其『暴君』形象的核心依据。"},{"name":"李斯","role":"丞相","avatar":"李斯.png","rel":"ruler","deed":"上书主张焚毁《诗》《书》百家典籍、禁绝以古非今的私学议政。","impact":"焚书令由此而出，思想管控加剧，李斯权位更固却招致后世恶评。"},{"name":"淳于越","role":"博士 · 儒生","avatar":"淳于越.png","rel":"ruler","deed":"在朝堂力主恢复分封、师古而行，触发李斯反击与焚书之争。","impact":"其复古主张成焚书导火索，儒生群体自此遭受空前打压。"},{"name":"扶苏","role":"长子","avatar":"扶苏.png","rel":"family","deed":"直言进谏，力劝父皇坑儒过苛、恐失天下之心。","impact":"触怒始皇被贬往北疆监军，父子渐生嫌隙，命运由此转折。"}],"links":[{"a":"李斯","b":"淳于越","type":"enemy","label":"廷争"}]},{"name":"沙丘之变","year":"前210-前207","period":"秦末","image":"沙丘之变与秦朝速亡.png","summary":"始皇东巡病逝沙丘，赵高胁李斯篡改遗诏、立胡亥、赐死扶苏；胡亥暴虐赵高专权，秦二世而亡。","summaryShort":"始皇病逝，赵高胁李斯篡诏立胡亥、赐死扶苏，秦二世而亡。","people":[{"name":"秦始皇","role":"始皇帝","avatar":"秦始皇.png","big":true,"deed":"第五次东巡途中病逝于沙丘，遗诏召长子扶苏继位却未及妥善安排后事。","impact":"骤然离世造成权力真空，遗诏被篡，一手缔造的帝国迅速崩塌。"},{"name":"赵高","role":"中车府令","avatar":"赵高.png","rel":"ruler","deed":"沙丘政变主谋，扣押遗诏、胁迫李斯，矫诏立胡亥、赐死扶苏，独揽朝政。","impact":"『指鹿为马』专权乱政、屠戮宗室功臣，直接加速秦朝灭亡。"},{"name":"胡亥","role":"秦二世","avatar":"胡亥.png","rel":"family","deed":"始皇幼子，经政变被立为二世皇帝，昏庸暴虐、诛戮兄弟大臣。","impact":"沦为赵高傀儡，激起陈胜吴广起义，终被逼自尽，秦二世而亡。"},{"name":"扶苏","role":"长子","avatar":"扶苏.png","rel":"family","deed":"本为遗诏所立继承人，戍守北疆时接矫诏，未辨真伪即自刎。","impact":"贤名之储含冤而死，秦失明主，天下扼腕，起义者多借其名号。"},{"name":"李斯","role":"丞相","avatar":"李斯.png","rel":"ruler","deed":"为保权位屈从赵高、合谋篡诏，背弃始皇托付。","impact":"助纣为虐终自食其果，后被赵高构陷腰斩于咸阳、夷灭三族。"},{"name":"蒙恬","role":"大将军","avatar":"蒙恬.png","rel":"ruler","deed":"扶苏监军的北疆统帅，劝扶苏复请核实诏令，遭矫诏收权下狱。","impact":"一代名将含冤被赐死，秦失长城军团柱石，北疆防务动摇。"}],"links":[{"a":"赵高","b":"胡亥","type":"ally","label":"拥立"},{"a":"赵高","b":"李斯","type":"enemy","label":"胁迫"},{"a":"赵高","b":"扶苏","type":"enemy","label":"矫诏"},{"a":"蒙恬","b":"扶苏","type":"ally","label":"共戍"}]}]</script><script src="../src/qinshihuang.js"></script><script>QinShihuangLibrary.mount(document.getElementById('mount'));</script></body></html>
