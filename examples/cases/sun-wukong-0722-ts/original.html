"海外高人"],desc:"灵台方寸山斜月三星洞之海外高人，孙悟空启蒙师父。传授长生之道、七十二变与筋斗云，因悟空卖弄本事恐惹祸端，遂逐其出师门。"}}},{key:"longgong",name:"龙宫闹海",desc:"悟空为寻一件称手兵器远赴东海龙宫，强索定海神针如意金箍棒，三海龙王另赠紫金冠、黄金甲与步云履。后又与牛魔王等妖王结拜，自封齐天大圣之号、七大圣之首，自此声威震彻三界四方，名动九霄，龙宫闹海一事亦惊动天庭。",descMobile:"悟空赴东海龙宫强索如意金箍棒，又与牛魔王等结拜七大圣，声威震彻三界，自此名动四方。",layout:"split",chars:["wukong","longwang","niumowang"],edges:[{a:"wukong",b:"longwang",type:"enemy",label:"闹龙宫"},{a:"wukong",b:"niumowang",type:"friend",label:"结拜兄弟"}],roles:{wukong:{rel:["美猴王","龙宫闹海"],desc:"为寻一件称手兵器赴东海龙宫，强索如意金箍棒，大闹龙宫。后与牛魔王等妖王结义，自封七大圣之首，声威震彻三界四方。"},longwang:{rel:["四海龙王","兵器赐予者"],desc:"四海龙王之首，掌管东海。悟空龙宫寻宝时被迫献出定海神针如意金箍棒，三海龙王另赠凤翅紫金冠等宝物，随即上报天庭。"},niumowang:{rel:["平天大圣","义兄"],desc:"号平天大圣，本体为白牛精，亦通七十二变。曾与孙悟空结拜为七大圣之首，后因红孩儿、芭蕉扇及地界之争，兄弟关系渐趋复杂。"}}},{key:"tianting",name:"大闹天宫",desc:"悟空先被玉帝封为弼马温，后又自称齐天大圣，仍不服天规，偷蟠桃盗御酒，搅乱蟠桃宴，大闹天宫。单枪匹马大战十万天兵与二郎神三百回合，终与如来赌斗法相，被压五行山下五百年，苦等唐僧西行搭救，候其悔过再起风云。",descMobile:"悟空受封齐天大圣后不服天规，偷桃盗丹大战天兵天将，终与如来赌斗法相，被压五行山下五百年。",layout:"siege",chars:["wukong","yudi","erlang","rulaifo"],edges:[{a:"wukong",b:"yudi",type:"enemy",label:"大闹天宫"},{a:"wukong",b:"erlang",type:"enemy",label:"斗法三百合"},{a:"rulaifo",b:"wukong",type:"enemy",label:"五行山压"}],roles:{wukong:{rel:["齐天大圣","叛逆英雄"],desc:"受封齐天大圣后仍不服天规，偷蟠桃盗御酒，大闹天宫，单枪匹马迎战天兵天将，展现不畏强权、敢与天地争锋的叛逆英雄气概。"},yudi:{rel:["天庭至尊","招安者"],desc:"天庭至尊，执掌三界。先以弼马温敷衍招安悟空，后封齐天大圣，终不能容其桀骜，遣十万天兵天将及二郎神围剿。"},erlang:{rel:["二郎真君","擒拿者"],desc:"玉帝外甥，显圣二郎真君，携梅山六兄弟与哮天犬下界擒猴。与孙悟空斗法三百回合不分胜负，是擒拿悟空的关键战将。"},rulaifo:{rel:["佛祖","镇压者"],desc:"西方极乐佛祖，与悟空以筋斗云赌斗法相，以五行山压其五百年，候其悔过。后封悟空为斗战胜佛，成就其修行圆满。"}}},{key:"qujing",name:"西天取经",desc:"观音点化唐僧西行取经，五行山下救出悟空并戴上紧箍咒，又收八戒、沙僧与白龙马组成取经团队。一路降妖除魔、逢山开路，历经九九八十一难，观音多次现身护持相助，师徒同心协力，终向灵山雷音寺进发。",descMobile:"观音点化唐僧师徒西行取经，收八戒沙僧白龙马，一路降妖除魔历经磨难，观音多次现身护持相助。",layout:"team",positions:{tangseng:[0.36,0.14],guanyin:[0.94,0.12],wukong:[0.48,0.5],bajie:[0.9,0.46],yaomogui:[0.12,0.82],bailong:[0.12,0.48],shaseng:[0.86,0.86]},chars:["wukong","tangseng","bajie","shaseng","bailong","guanyin","yaomogui"],edges:[{a:"tangseng",b:"wukong",type:"master",label:"取经师父"},{a:"wukong
