<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>明星组合 · 复用模板</title>
<style>
  html, body {
    width: 100%; height: 100%; margin: 0;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  body {
    display: grid;
    place-items: center;
    background: #F8F8F8;
    font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  }
</style>
<link rel="stylesheet" href="../src/star-group.css">
</head>
<body>
<div id="mount"></div>

<script src="../src/star-group.js"></script>
<script>
/* -------------------------------------------------------------
 * 明星组合 · 动态百科成员探索卡 - 空白复用模板
 * 替换下方 options 中的占位数据即可生成新卡片。
 * 数据契约见 ../README.md。
 * ----------------------------------------------------------- */
StarGroup.mount(document.getElementById('mount'), {
  title: '组合名称',                         // 卡片标题（用于 a11y 标签）
  ariaLabel: '组合名称 · 动态百科成员探索卡',   // 画布 aria-label

  /* Tab 配置：前三个为面板切换，末位固定为 more（打开资料 Modal） */
  tabs: [
    { id: 'members',  label: '成员详情', count: 0 },  // count 显示在 <small>
    { id: 'timeline', label: '经历',     count: 0 },
    { id: 'works',    label: '团体作品', count: 0 },
    { id: 'more',     label: '其它',     more: true }
  ],

  /* ---- 初始引导遮罩：组合照玻璃磨砂四分入口 ----
     entryCoverImg: 组合照 URL（铺满整个画布，object-position: center 22%）
     entryCells: 与 tabs 对齐，4 项，每项含 no/name/arrow */
  entryCoverImg: 'https://example.com/group-photo.jpg',
  entryCoverAlt: '组合合照',
  entryCells: [
    { no: '01', name: '成员详情', arrow: '↓' },
    { no: '02', name: '经历',     arrow: '↓' },
    { no: '03', name: '团体作品', arrow: '↓' },
    { no: '04', name: '其它',     arrow: '↗' }
  ],

  /* ---- 成员数据 ----
     key: 唯一标识；name: 展示名；role: 队内定位（含「队内定位：」前缀，详情面板用全称，卡片用去前缀值）
     shortName: 图片加载失败时的兜底文字；state: 状态徽标
     img: 头像 URL；photoSource: 图片来源标注（小屏隐藏）
     relations: 详情面板的 [label, value] 行 */
  members: [
    {
      key: 'member-1', name: '成员一 · 中文名', role: '队内定位：主唱 · 视觉',
      shortName: 'M1', state: '在团',
      img: 'https://example.com/avatar-1.jpg',
      photoSource: '来源',
      relations: [
        ['所属团体', '组合名称'],
        ['队内角色', '主唱 · 视觉'],
        ['加入阶段', '出道成员 · 2020'],
        ['团体代表', '《作品 A》《作品 B》'],
        ['当前状态', '在团']
      ]
    },
    {
      key: 'member-2', name: '成员二 · 中文名', role: '队内定位：主唱 · 说唱',
      shortName: 'M2', state: '在团',
      img: 'https://example.com/avatar-2.jpg',
      photoSource: '来源',
      relations: [
        ['所属团体', '组合名称'],
        ['队内角色', '主唱 · 说唱'],
        ['加入阶段', '出道成员 · 2020'],
        ['团体代表', '《作品 A》《作品 C》'],
        ['当前状态', '在团']
      ]
    },
    {
      key: 'member-3', name: '成员三 · 中文名', role: '队内定位：主唱 · 领舞',
      shortName: 'M3', state: '在团',
      img: 'https://example.com/avatar-3.jpg',
      photoSource: '来源',
      relations: [
        ['所属团体', '组合名称'],
        ['队内角色', '主唱 · 领舞'],
        ['加入阶段', '出道成员 · 2020'],
        ['团体代表', '《作品 B》《作品 C》'],
        ['当前状态', '在团']
      ]
    },
    {
      key: 'member-4', name: '成员四 · 中文名', role: '队内定位：主舞 · 说唱 · 副唱',
      shortName: 'M4', state: '在团',
      img: 'https://example.com/avatar-4.jpg',
      photoSource: '来源',
      relations: [
        ['所属团体', '组合名称'],
        ['队内角色', '主舞 · 说唱 · 副唱'],
        ['加入阶段', '出道成员 · 2020'],
        ['团体代表', '《作品 A》《作品 C》'],
        ['当前状态', '在团']
      ]
    }
  ],

  /* ---- 经历数据 ----
     time: 时间节点（如 "2016.08"）；title: 事件标题
     desc: 折叠态简短描述；story: 展开态经历背景长文
     img/alt: 节点配图 */
  timeline: [
    {
      time: '2020.01', title: '出道 ·《首张单曲》', alt: '出道',
      img: 'https://example.com/timeline-1.jpg',
      desc: '以双主打正式出道,确立四人编制主唱/主舞双轴。',
      story: '出道前的练习生训练与选拔经历,双主打曲目的创作背景与出道当日成绩。'
    },
    {
      time: '2022.06', title: '《首张迷你专辑》', alt: '迷你专辑',
      img: 'https://example.com/timeline-2.jpg',
      desc: '凭主打曲刷新 MV 观看纪录,全员参与词曲与编舞。',
      story: '专辑制作过程、主打曲的音乐特色与全球榜单成绩。'
    }
  ],

  /* ---- 团体作品数据 ----
     img/alt: 作品封面；year: 年份与类型；title: 作品名
     desc: 悬停中心卡时可见的简短描述；story: 故事面板的创作背景长文 */
  works: [
    {
      img: 'https://example.com/work-1.jpg', alt: '作品一封面',
      year: '2020 · 单曲', title: '《首张单曲》',
      desc: '出道双主打收录,团体首支作品。',
      story: '出道作品的完整创作背景、双主打的选拔与定位意义。'
    },
    {
      img: 'https://example.com/work-2.jpg', alt: '作品二封面',
      year: '2022 · 迷你专辑', title: '《首张迷你专辑》',
      desc: '包含多首团体主打曲目。',
      story: '迷你专辑的制作过程、主打曲的全球成绩与榜单表现。'
    }
  ],

  /* ---- 资料与说明（"其它"Tab 触发） ----
     moreFacts: [{label, value, full?}]，full 跨两列 */
  moreTitle: '资料与说明',
  moreSub: '本卡片仅使用可核实的公开事实,具体年代、关系以官方与权威来源为准。',
  moreDecl: '动态百科 · 资料与说明',
  moreFacts: [
    { label: '词条类型', value: '女子演唱组合 · 四人编制' },
    { label: '经纪机构', value: '经纪公司名称' },
    { label: '出道日期', value: '2020 年 1 月 1 日' },
    { label: '当前成员', value: '成员一、成员二、成员三、成员四 - 均为出道成员' },
    { label: '历任成员', value: '暂无退出成员;若以官方公告为准。' },
    { label: '图片来源', value: '成员一头像来源:来源 · 词条' },
    { label: '资料声明', value: '事实中立,虚构履历或未公开状态一律不填写。', full: true }
  ],

  autoPlayMember: 3000,   // 成员自动播放间隔（ms）
  autoPlayWorks: 3500     // 作品自动播放间隔（ms）
});
</script>
</body>
</html>
