<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Form dialog</title></head>
<body>
  <main id="app">
    <form class="account-form">
      <label for="email">Email address</label>
      <input id="email" name="email" type="email">
      <button type="button" id="open-dialog">Review</button>
    </form>
  </main>
  <script>
    const dialog = document.createElement('section');
    dialog.className = 'dialog-panel';
    dialog.setAttribute('role', 'dialog');
    dialog.setAttribute('aria-label', 'Review account');
    dialog.textContent = 'Review account details';
    document.getElementById('app').appendChild(dialog);
  </script>
</body>
</html>
